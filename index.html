<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shyam Earth Movers</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:white;
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:#000;
}

.logo img{
    height: 50px;
    width:auto;
}

.nav-links ul{
    display:flex;
    list-style:none;
    gap:20px;
}

.nav-links ul li a{
    color:white;
    text-decoration:none;
    font-size:20px;
    padding:8px 15px;
    border-radius:5px;
    transition:0.3s;
}

.nav-links ul li a:hover{
    background:#e67700;
}

/* Hero section */

.hero{
    height:calc(100vh - 90px);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    position: relative; /* added for video positioning */
    overflow: hidden;   /* ensures video fills area */
    background: white;  /* fallback */
    /* background-image removed, video will be used */
}

/* video element as background */
#hero-video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    transform: translate(-50%, -50%);
    object-fit: cover;    /* covers entire hero area */
    z-index: 0;
}

/* content on top of video */
.hero-content {
    position: relative;
    z-index: 1;
}

.hero-content h1{
    color: #d9d9d9;;
    font-size:60px;
    font-style:italic;
    margin-bottom:15px;
    text-transform:uppercase;
    background-color: #000;
    opacity: 0.6;
    border-radius: 10px;
}

.hero-content p{
    color:#e67700;
    font-size:24px;
    letter-spacing:8px;
}

/* Mobile */

@media(max-width:768px){

.navbar{
    flex-direction:column;
    gap:15px;
}

.nav-links ul{
    flex-direction:column;
    text-align:center;
}

.hero-content h1{
    font-size:40px;
}

}
</style>

</head>

<body>

<nav class="navbar">

<div class="logo">
    <img src="logo.jpeg" alt="Shyam Earth Movers Logo">
</div>

<div class="nav-links">
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</div>

</nav>

<section class="hero">
    <video autoplay muted loop id="hero-video">
        <source src="background video.mp4" type="video/mp4">
    </video>
    <div class="hero-content">
        <h1>Shyam Earth Movers</h1>
        <p>~ Since 2008 ~</p>
    </div>
</section>
</body>
</html>
